<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資深玩家 | SCIST 2025 聯合寒訓</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <script src="https://kit.fontawesome.com/a80c5dc208.js" crossorigin="anonymous"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="./clock.js"></script>
</head>

<body>
    <div class="cover"></div>
    <a href="#intro">
        <div class="sd"> <!--sd=scroll down-->
            <p class="sd_icon">
                <i class="fa fa-angle-double-down"></i>
            </p>
            <p>向下滑看更多</p>
        </div>
    </a>
    <div id="intro">
        <div class="col1">
            <div class="box1">
                <h1>還不知道寒假要去哪裡玩嗎?</h1>
                <div class="des">
                    <p>來寒訓吧!</p>
                </div>
            </div>
            <div class="row1">
                <div class="box_long">
                    <h1>📝 活動簡介</h1>
                    <div class="des">
                        <p>WTF...</p>
                    </div>
                </div>
                <div class="box1">
                    <h1>🕒 活動時間</h1>
                    <div class="des">
                        <p>2024/1/24~26</p>
                    </div>
                </div>
            </div>
            <div class="row1">
                <div class="box1">
                    <h1>🎉 活動地點</h1>
                    <div class="des">
                        <p>臺南一中、成功大學</p>
                    </div>
                </div>
                <div class="col1" style="flex-grow:2;">
                    <div class="box1">
                        <h1>🕐 報名倒數計時</h1>
                        <div class="clock">
                            <div class="row1" style="align-items: center; justify-content: space-around;">
                                <div class="digit_col" style="align-items: center;"> <!-- one digit -->
                                    <p id="clock_day">?</p>
                                    <p>日</p>
                                </div>
                                <div class="digit_col"> <!-- one digit -->
                                    <p id="clock_hour">?</p>
                                    <p>時</p>
                                </div>
                                <div class="digit_col"> <!-- one digit -->
                                    <p id="clock_min">?</p>
                                    <p>分</p>
                                </div>
                                <div class="digit_col"> <!-- one digit -->
                                    <p id="clock_sec">?</p>
                                    <p>秒</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row1">
                        <div class="box1">
                            lol6
                        </div>
                        <div class="box1">
                            lol7
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="event">
        <h1>活動</h1>
        <div class="col1">
            <div class="row1">
                <div class="fg2"></div>
                <div class="fg1"><!--image--></div>
            </div>
            <div class="row1">
                <div class="fg1"><!--image--></div>
                <div class="fg2"></div>
            </div>
            <div class="row1">
                <div class="fg2"><!--image--></div>
                <div class="fg1"></div>
            </div>
            <div class="row1">
                <div class="fg1"><!--image--></div>
                <div class="fg2"></div>
            </div>
        </div>
    </div>
    <div id="teacher">
        <h1>講師</h1>
        <div class="box1">
            <div class="col1">
                <div class="fg1"><!--image--></div>
                <div class="fg2"><!--description--></div>
                <div style="display: none;">
                    <hr>
                    lololol
                </div>
            </div>
        </div>

        </div>
    </div>
    <div id="times">

    </div>
    <div id="sponsor">

    </div>
    <div id="co_school">

    </div>
    <footer></footer>
</body>

</html>
